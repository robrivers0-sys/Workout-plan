      </div>

      <div style={{ padding: "16px 14px 0", maxWidth: 640, margin: "0 auto" }}>

        {/* PLAN TAB */}
        {tab === "plan" && (
          <div className="fade-in">
            {/* Phase Pills */}
            <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
              {PLAN.phases.map((ph, i) => (
                <button key={ph.id} className="phase-btn" onClick={() => { setPhase(i); setOpenDay(null); }} style={{
                  flex: 1, padding: "12px 8px", borderRadius: 10, textAlign: "left",
                  border: `1.5px solid ${phase === i ? ph.color + "80" : "#1a1a28"}`,
                  background: phase === i ? ph.color + "15" : "#0c0c18",
                }}>
                  <div className="barlow" style={{ fontSize: 22, fontWeight: 800, color: phase === i ? ph.color : "#333", lineHeight: 1 }}>{ph.label}</div>
                  <div style={{ fontSize: 10, color: phase === i ? "#888" : "#2a2a38", marginTop: 2, fontWeight: 600, letterSpacing: "0.3px" }}>{ph.weeks}</div>
                  <div className="barlow" style={{ fontSize: 12, color: phase === i ? ph.color : "#2a2a38", marginTop: 1, fontWeight: 700 }}>{ph.subtitle.toUpperCase()}</div>
                </button>
              ))}
            </div>

            {/* Phase banner */}
            <div style={{
              background: p.color + "0e", border: `1px solid ${p.color}25`, borderRadius: 10,
              padding: "12px 14px", marginBottom: 14, display: "flex", gap: 10, alignItems: "center"
            }}>
              <div style={{ width: 5, height: 5, borderRadius: "50%", background: p.color, flexShrink: 0 }} />
              <p style={{ fontSize: 12, color: "#888", lineHeight: 1.5, flex: 1 }}>{p.description}</p>
              <span style={{
                background: p.color + "20", color: p.color, padding: "4px 9px",
                borderRadius: 20, fontSize: 10, fontWeight: 700, letterSpacing: "0.3px", flexShrink: 0
              }}>{p.badge}</span>
            </div>

            {/* Days */}
            <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
              {p.days.map((d, di) => {
                const isOpen = openDay === di;
                const isRest = d.tag === "Rest";
                return (
                  <div key={d.day} className="day-card" style={{
                    background: "#0c0c18",
                    border: `1px solid ${isOpen ? p.color + "50" : "#161622"}`,
                    borderRadius: 10, overflow: "hidden",
                  }}>
                    <div onClick={() => !isRest && setOpenDay(isOpen ? null : di)}
                      style={{ display: "flex", alignItems: "center", padding: "13px 14px", gap: 12, cursor: isRest ? "default" : "pointer" }}>
                      <span style={{ fontSize: 20, width: 26, textAlign: "center", flexShrink: 0 }}>{d.icon}</span>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 7, flexWrap: "wrap" }}>
                          <span className="barlow" style={{ fontSize: 17, fontWeight: 800, color: isOpen ? p.color : "#bbb", letterSpacing: "0.5px" }}>{d.day.toUpperCase()}</span>
                          {d.physio && <span style={{ background: "#8B5CF615", color: "#C4B5FD", padding: "2px 7px", borderRadius: 20, fontSize: 9, fontWeight: 700, letterSpacing: "0.3px" }}>PHYSIO</span>}
                        </div>
                        <div style={{ fontSize: 11, color: "#555", marginTop: 1, fontWeight: 500 }}>{d.tag}</div>
                      </div>
                      {!isRest && <span style={{ color: "#333", fontSize: 12 }}>{isOpen ? "▲" : "▼"}</span>}
                    </div>

                    {isOpen && (
                      <div className="fade-in" style={{ padding: "0 12px 14px", display: "flex", flexDirection: "column", gap: 10 }}>
                        {d.blocks.map((block, bi) => {
                          const ts = TYPE_STYLE[block.type] || TYPE_STYLE.strength;
                          return (
                            <div key={bi} style={{ background: ts.bg, border: `1px solid ${ts.border}25`, borderRadius: 8, overflow: "hidden" }}>
                              <div style={{ padding: "8px 12px", borderBottom: `1px solid ${ts.border}18`, display: "flex", alignItems: "center", gap: 7 }}>
                                <span style={{ width: 6, height: 6, borderRadius: "50%", background: ts.dot, display: "inline-block", flexShrink: 0 }} />
                                <span style={{ fontSize: 10, fontWeight: 700, color: ts.label, letterSpacing: "0.7px", textTransform: "uppercase" }}>{block.title}</span>
                              </div>
                              {block.exercises.map((ex, ei) => (
                                <div key={ei} style={{
                                  padding: "9px 12px",
                                  borderBottom: ei < block.exercises.length - 1 ? `1px solid ${ts.border}12` : "none",
                                  display: "grid", gridTemplateColumns: "1fr auto auto", gap: 6, alignItems: "start"
                                }}>
                                  <div>
                                    <div style={{ fontSize: 13, fontWeight: 600, color: "#d0d0e0" }}>{ex.name}</div>
                                    {ex.note && <div style={{ fontSize: 11, color: "#555", marginTop: 2, lineHeight: 1.4 }}>{ex.note}</div>}
                                  </div>
                                  <div style={{ textAlign: "center", minWidth: 30 }}>
                                    {ex.sets && <>
                                      <div style={{ fontSize: 9, color: "#444", fontWeight: 700, letterSpacing: "0.5px" }}>SETS</div>
                                      <div style={{ fontSize: 14, fontWeight: 700, color: ts.label }}>{ex.sets}</div>
                                    </>}
                                  </div>
                                  <div style={{ textAlign: "center", minWidth: 48 }}>
                                    {ex.reps && <>
                                      <div style={{ fontSize: 9, color: "#444", fontWeight: 700, letterSpacing: "0.5px" }}>REPS</div>
                                      <div style={{ fontSize: 12, fontWeight: 700, color: ts.label }}>{ex.reps}</div>
                                    </>}
                                  </div>
                                </div>
                              ))}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* MILESTONES TAB */}
        {tab === "milestones" && (
          <div className="fade-in">
            <h2 className="barlow" style={{ fontSize: 26, fontWeight: 800, color: "#fff", marginBottom: 16 }}>PROGRESS MILESTONES</h2>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {PLAN.milestones.map((m, i) => (
                <div key={i} style={{ background: "#0c0c18", border: `1px solid ${i === 3 ? "#FF2D5530" : "#161622"}`, borderRadius: 10, padding: "16px 14px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                    <div style={{
                      width: 38, height: 38, borderRadius: "50%", flexShrink: 0,
                      background: i === 3 ? "#FF2D5520" : "#111120",
                      border: `2px solid ${i === 3 ? "#FF2D55" : "#222"}`,
                      display: "flex", alignItems: "center", justifyContent: "center",
                    }}>
                      <span className="barlow" style={{ fontSize: 14, fontWeight: 800, color: i === 3 ? "#FF2D55" : "#666" }}>
                        {i === 3 ? "🏁" : `W${m.week}`}
                      </span>
                    </div>
                    <span className="barlow" style={{ fontSize: 15, fontWeight: 700, color: i === 3 ? "#FF2D55" : "#888" }}>
                      {i === 3 ? "GOAL DATE — JULY 30TH" : `END OF WEEK ${m.week}`}
                    </span>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                    {[["🏃 Running", m.running, "#F59E0B"], ["🔝 Pull-Ups", m.pullups, "#3B82F6"], ["💪 Core", m.core, "#10B981"]].map(([lbl, val, col]) => (
                      <div key={lbl} style={{ background: col + "12", border: `1px solid ${col}25`, borderRadius: 8, padding: "9px 10px" }}>
                        <div style={{ fontSize: 9, fontWeight: 700, color: col, letterSpacing: "0.4px", marginBottom: 5 }}>{lbl}</div>
                        <div style={{ fontSize: 11, color: "#bbb", fontWeight: 500, lineHeight: 1.4 }}>{val}</div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* NUTRITION TAB */}
        {tab === "nutrition" && (
          <div className="fade-in">
            <h2 className="barlow" style={{ fontSize: 26, fontWeight: 800, color: "#fff", marginBottom: 6 }}>NUTRITION GUIDE</h2>
            <p style={{ fontSize: 12, color: "#555", marginBottom: 18 }}>The hidden lever. Training alone won't create visible abs.</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
              {PLAN.nutrition.map((n, i) => (
                <div key={i} style={{ background: "#0c0c18", border: "1px solid #161622", borderRadius: 10, padding: "16px 14px", display: "flex", gap: 12 }}>
                  <span style={{ fontSize: 24, flexShrink: 0 }}>{n.icon}</span>
                  <div>
                    <div className="barlow" style={{ fontSize: 15, fontWeight: 700, color: "#00E5A0", marginBottom: 3 }}>{n.label.toUpperCase()}</div>
                    <div style={{ fontSize: 13, color: "#ccc", fontWeight: 500, marginBottom: 3 }}>{n.value}</div>
                    <div style={{ fontSize: 11, color: "#555" }}>{n.detail}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* RULES TAB */}
        {tab === "rules" && (
          <div className="fade-in">
            <h2 className="barlow" style={{ fontSize: 26, fontWeight: 800, color: "#fff", marginBottom: 6 }}>NON-NEGOTIABLES</h2>
            <p style={{ fontSize: 12, color: "#555", marginBottom: 18 }}>Five rules that override everything else.</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
              {PLAN.rules.map((r, i) => (
                <div key={i} style={{ background: "#0c0c18", border: "1px solid #161622", borderRadius: 10, padding: "16px 14px", display: "flex", gap: 12, alignItems: "center" }}>
                  <div style={{
                    width: 34, height: 34, borderRadius: "50%", background: "#FF2D5512", border: "1.5px solid #FF2D5530",
                    display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 16
                  }}>{r.icon}</div>
                  <p style={{ fontSize: 13, color: "#bbb", lineHeight: 1.5 }}>{r.text}</p>
                </div>
              ))}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
